name: qr_scanner_pro
description: "QR Scanner Pro - Fast and accurate QR Code scanner with auto zoom and multi-lens support."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  mobile_scanner: ^6.0.2
  flutter_riverpod: ^2.6.1
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  intl: ^0.19.0
  go_router: ^14.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "qrscanner-logo.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "qrscanner-logo.png"

flutter_native_splash:
  color: "#121212"
  image: "qrscanner-logo.png"
  android_12:
    color: "#121212"
    image: "qrscanner-logo.png"
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center

flutter:
  uses-material-design: true